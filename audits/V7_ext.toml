# =============================================================================
# CRITICAL  -  External crate extensibility is blocked or misrepresented
# =============================================================================

[[finding]]
id = "V7-EXT-001"
severity = "critical"
file = "vyre-libs-extern/src/lib.rs"
line = 34
why = "ExternDialect inventory is never consumed by DialectRegistry; downstream crates can submit but ops are invisible to driver, reference interpreter, and dispatch paths."
proposed_fix = "Add a bridge in vyre-driver/src/registry/registry.rs::from_inventory() that walks inventory::iter::<ExternOp>, constructs OpDef values, and injects them into the registry freeze path."
status = "open"

[[finding]]
id = "V7-EXT-002"
severity = "critical"
file = "vyre-libs-extern/src/lib.rs"
line = 56
why = "ExternOp inventory is never consumed by DialectRegistry::from_inventory(); external ops cannot be looked up or dispatched."
proposed_fix = "Same bridge as V7-EXT-001: ingest ExternOp entries into DialectRegistry alongside OpDefRegistration, or document that ExternOp is purely advisory and require community packs to also submit OpDefRegistration."
status = "open"

[[finding]]
id = "V7-EXT-003"
