[[finding]]
id = "V7-CORR-016"
severity = "major"
file = "vyre-spec/src/all_algebraic_laws.rs"
line = 26
why = """
The canonical algebraic-law catalog references op IDs that do not
exist in the registered op set. For example:
- `inner_op: "primitive.bitwise.and"`  -  actual ID is `primitive.logical.and`
- `over_op: "primitive.math.add"`  -  no such op exists (math ops are `avg_floor`, `wrapping_neg`)
- `dual_op: "primitive.math.min"`  -  no such op exists
Because the law registry is indexed by op_id, these entries will
never be matched to any real operation, making the catalog useless
for canonical-form passes that rely on `laws_for_op`.
"""
proposed_fix = """
Audit every string literal in `all_algebraic_laws.rs` against the
actual `OP_ID` constants in `vyre-ops/src/*/op.rs`. Replace
fictional IDs with real ones, or register the missing primitives
if the laws are intended to apply to them.
"""

[[finding]]
id = "V7-CORR-017"
severity = "major"
file = "vyre-reference/src/hashmap_interp.rs"
line = 198
why = """
Workgroups are dispatched in parallel via `rayon::par_iter`. Each
workgroup receives a cloned `HashmapMemory` whose storage buffers
share the underlying `Arc<RwLock<Vec<u8>>>`. Atomics are
sequentialized only *within* a workgroup by the round-robin stepper.
Across workgroups there is no defined ordering: two workgroups
issuing `atomic_add` to the same index race through the same
`RwLock`, and the winner depends on rayon scheduling. The V7 plan
(line 141–148) claims sequential semantics for all atomics, but
the interpreter does not provide cross-workgroup sequentialization.
"""
proposed_fix = """
Replace the per-workgroup parallel dispatch with a single dispatcher
that runs all workgroups sequentially, or implement a global atomic
sequencer (e.g., a `Mutex` around the atomic buffer operations) that
preserves total order across all invocations in the dispatch.
"""

[[finding]]
id = "V7-CORR-018"
severity = "minor"
file = "vyre-libs/src/math/scan/prefix_sum.rs"
line = 18
why = """
The docstring claims "inclusive prefix sum" but does not document
that intermediate additions use `u32::wrapping_add`. For large
inputs the accumulator silently wraps around modulo 2^32, producing
incorrect mathematical results. The CPU reference (`Expr::add` in
typed_ops.rs) does wrap, so the code is internally consistent, but
the contract omits a critical semantic detail required for callers
to reason about correctness.
"""
proposed_fix = """
Add an explicit note to the docstring: "All arithmetic is unsigned
32-bit wrapping; overflow is defined modulo 2^32." If wrapping is
not the intended semantics, switch to `checked_add` and return an
error on overflow.
"""
