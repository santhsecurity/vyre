# V7 Phase C2 audit #4  -  API SURFACE
# Scope: vyre, vyre-core, vyre-foundation, vyre-spec, vyre-intrinsics, vyre-libs,
#         vyre-libs-extern, vyre-driver, vyre-driver-wgpu, vyre-driver-spirv,
#         vyre-driver-photonic, vyre-pipeline, vyre-pipeline-cache, vyre-macros,
#         vyre-primitives, vyre-reference
# Checks: doc comments, non_exhaustive, public paths, redundant re-exports,
#         feature consistency, sealed traits, internal type leakage.
# Date: 2026-04-20
# Auditor: automated + manual review

[[finding]]
id = "V7-API-001"
severity = "HIGH"
file = "vyre-core/src/lib.rs"
line = 96
description = "Root re-export `pub use vyre_foundation::ir;` lacks a `///` doc comment. The crate root exposes ~14 `pub use` items and only a minority carry docs."
suggested_fix = "Add a `///` doc comment above every `pub use` and `pub` re-export block at the crate root, describing what the consumer gets and when they need it."

