[[finding]]
id = "V7-API-014"
severity = "CRITICAL"
file = "vyre-driver/src/backend.rs"
line = 421
description = "`VyreBackend` seal is ineffective. The `#[doc(hidden)] fn __vyre_backend_sealed(&self) {}` method does NOT prevent external crates from implementing the trait: Rust trait impls can provide non-public methods of a public trait. The comment at line 773 claims the seal works, but it does not."
suggested_fix = "Use a proper sealed-trait pattern: introduce a `pub(crate) mod private { pub trait Sealed {} }` and make `VyreBackend: private::Sealed`. Internal backends implement `private::Sealed` in-crate; external crates cannot name the private module and thus cannot implement `VyreBackend`."

[[finding]]
id = "V7-API-015"
severity = "HIGH"
file = "vyre-driver/src/registry/enforce.rs"
line = 36
description = "`pub trait EnforceGate` is unsealed. Third-party crates can implement this trait and register a gate that returns `Allow` for every program, bypassing conformance enforcement entirely."
suggested_fix = "Seal `EnforceGate` with a private supertrait (same pattern as V7-API-014) so only the in-tree registry can provide implementations."

