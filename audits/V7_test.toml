matmul has a grid-overshoot guard (col < n && idx < buf_len) that
is also untested with oversized workgroups.
"""
fix = "Add adversarial tests that dispatch with buf_len < workgroup_size_x and assert no out-of-bounds write (via poison-value padding or buffer bounds checking)."

