[[finding]]
id = "V7-TEST-034"
date_opened = "2026-04-20"
severity = "HIGH"
file = "conform/vyre-conform-runner/src/main.rs"
line = 1
title = "vyre-conform-runner does not assert byte-identity on dispatch"
description = """
The conform-runner CLI supports 'run --backend <id>' and
'prove --out <cert.json>', but the implementation only checks
backend acquisition and op advertisement in the registry. It does
not run inputs through the backend and assert byte-identity against
the CPU reference. The conform crates enforce wire format and
validation invariants, but they do not serve as a load-bearing
op-dispatch parity gate.
"""
fix = "Extend conform-runner to dispatch canonical witness inputs through the selected backend, compare against vyre_reference output, and emit cert.json only on byte-identity pass."
