schema_version = "1"
# V7 Phase C2 audit #5  -  TESTING / HARNESS
# Read-only audit of test coverage, harness completeness, adversarial design,
# fuzz, proptest, #[ignore] discipline, benchmarks, and conform parity.
# Prefix: V7-TEST-xxx
# Minimum 20 findings  -  34 findings recorded.

[[finding]]
id = "V7-TEST-001"
date_opened = "2026-04-20"
severity = "CRITICAL"
file = "vyre-libs/src/math/linalg/matmul_tiled.rs"
line = 244
title = "matmul_tiled has no test_inputs and no execution tests"
description = """
The inventory::submit!(OpEntry { … }) for matmul_tiled sets
test_inputs = None and expected_output = None. The universal harness
skips it entirely. There are no CPU conform, differential fuzz, or GPU
differential tests that execute this op. Only structural tests exist
(overflow_guards, gap, integration, property, fingerprint_lock).
"""
fix = "Add test_inputs covering empty matrix, 1x1, non-square, MAX-dim overflow boundary, and tile-boundary sizes. Wire into cat_a_conform.rs and cat_a_gpu_differential.rs."

[[finding]]
id = "V7-TEST-002"
date_opened = "2026-04-20"
severity = "CRITICAL"
file = "vyre-libs/src/nn/attention/softmax.rs"
line = 217
title = "softmax has zero execution tests and no NaN/Inf coverage"
description = """
softmax registers with test_inputs = None. There are no conform,
fuzz, differential, or GPU tests executing it. Inline #[cfg(test)]
only validates builder rejects (dtype/shape mismatch, name collision).
Because it is an F32 op, NaN and Inf propagation are completely
unverified  -  a silent NaN fan-out would go undetected.
"""
fix = "Add test_inputs with canonical 1D/2D vectors, empty vector, single-element, and NaN/Inf witnesses. Execute through CPU reference and GPU differential."

