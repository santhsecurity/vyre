[[finding]]
id = "V7-TEST-014"
date_opened = "2026-04-20"
severity = "CRITICAL"
file = "vyre-libs/tests/universal_harness.rs"
line = 1
title = "Universal harness only runs CPU, never exercises GPU backends"
description = """
The canonical universal_harness.rs in vyre-libs calls
vyre_reference::run (pure-Rust CPU interpreter). It never dispatches
