exists in vyre-driver-wgpu/tests/cat_a_gpu_differential.rs, but that
is a separate crate with its own manually written tests. There is no
single harness iterating all registered OpEntry across all backends.
"""
fix = "Extend universal_harness.rs to acquire every registered backend (wgpu, spirv, photonic) and assert_diff(CPU, backend) for every OpEntry with test_inputs. Gate behind --ignored or CI feature if hardware is absent."

