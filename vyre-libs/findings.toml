[[finding]]
id = "FINDING-PRIM-2"
date_opened = "2026-04-20"
date_fixed = "2026-04-21"
owner = "contactmukundthiru"
test = "vyre_libs::tests::primitive_gaps::gap_subgroup_ops_feature_gate"
status = "fixed"
title = "Subgroup ops should be gated behind a feature flag"
blocker = """
`Expr::SubgroupBallot`, `SubgroupShuffle`, `SubgroupAdd` are
constructible in the IR today but lowering returns a structured
LoweringError until Naga 25+ ships. Consumers that construct these
pre-0.6 get a clean error but no compile-time protection. Gating
them behind `cfg(feature = "subgroup-ops")` would eliminate even
that runtime path.
"""
fix_plan = """
1. Add `subgroup-ops` feature to vyre-spec (off by default).
2. Gate the 3 variant declarations behind `#[cfg(feature = "subgroup-ops")]`.
3. Gate every match arm in vyre-foundation + backends behind the
   same cfg. All existing no-op handlers already treat the variants
   as no-ops  -  only the gated path lowers them meaningfully.
4. When Naga 25 + the feature ship together, the variants become
   first-class.
"""

[[finding]]
id = "FINDING-GPU-1"
date_opened = "2026-04-20"
date_fixed = "2026-04-20"
owner = "contactmukundthiru"
test = "vyre_driver_wgpu::tests::cat_a_gpu_differential::*"
status = "fixed"
title = "Cat-A ops dispatched on wgpu require `BufferDecl::output(...)`  -  declared as `ReadWrite`"
blocker = """
Every vyre-libs Cat-A op declares its result buffer as
`BufferDecl::read_write(...)`. The wgpu backend's
`output_layout_from_program` requires exactly one buffer with
`is_output = true`. Direct GPU dispatch of any vyre-libs Cat-A
program fails at readback with `BackendError::Raw("program has
no output buffer. Fix: declare exactly one output buffer in
the vyre Program.")`.

Surfaced by the new tests/cat_a_gpu_differential.rs harness on a
real 5090 run 2026-04-20  -  every op (dot, matmul, scan_prefix_sum,
broadcast, relu, linear, substring_search, aho_corasick, fnv1a32,
blake3_compress) panics identically.

This means a downstream security-analysis consumer dispatching Cat-A ops over the wgpu backend
today would fail before the GPU even executes the shader.
"""
fix_plan = """
1. vyre-libs/src/*/*/*.rs  -  change every `BufferDecl::read_write`
   on the final write target to `BufferDecl::output` (keep all
   intermediate RW scratch buffers as read_write).
2. Regenerate KAT fingerprints in tests/fingerprint_lock.rs
   (the wire encoding changes because is_output=true flips a bit).
3. Regenerate fixtures/aho_corasick.toml, fixtures/blake3.toml.
4. Re-run tests/cat_a_gpu_differential.rs and assert
   byte-identity vs. CPU ref. The #[ignore] lifts on green.
"""

[[finding]]
id = "FINDING-GPU-2"
date_opened = "2026-04-20"
date_fixed = "2026-04-20"
owner = "contactmukundthiru"
test = "vyre_driver_wgpu::tests::cat_a_gpu_differential::*"
status = "fixed"
title = "WgpuBackend.dispatch rejects Cat-A programs before region_inline fires"
blocker = """
Cat-A ops wrap their body in `Node::Region` for debuggability.
When dispatched directly via `WgpuBackend::dispatch`, the
validator trips on Region with `vyre.node.unknown`  -  the backend
never reaches `transform::optimize::optimize` (which would have
inlined the Region via `region_inline::run`).

Workaround applied in tests/cat_a_gpu_differential.rs: call
`vyre_foundation::transform::optimize::optimize(program.clone())`
before dispatch. Every consumer of vyre-libs would need the same
boilerplate, which is hostile to the library contract.
"""
fix_plan = """
Option A (preferred): make Region a recognized structural node
in vyre-driver's capability set  -  validator skips it, dispatch
path runs optimize() before validation. Region becomes
capability-neutral (any backend dispatching a program
containing Region implicitly inlines).

Option B (fallback): document that Cat-A programs must go
through `optimize()` before `dispatch()`. Add a one-liner
`vyre_libs::prepare_for_dispatch(program)` wrapper so the
boilerplate is a single function call.

Either path must land before 0.6 publishes, else downstream
downstream security-analysis consumers and every community consumer will hit this the first time
they try to run a Cat-A op on real hardware.
"""

[[finding]]
id = "FINDING-GPU-3"
date_opened = "2026-04-20"
date_fixed = "2026-04-20"
owner = "contactmukundthiru"
test = "vyre_driver_wgpu::tests::cat_a_gpu_differential::*"
status = "fixed"
title = "wgpu Naga emitter missing Node::Loop  -  Cat-A ops can't lower to GPU"
blocker = """
`vyre-driver-wgpu/src/lowering/naga_emit/node.rs:107` currently
returns `LoweringError::invalid("this statement kind is not
representable in the wgpu Naga emitter yet")` for Node::Loop,
Node::IndirectDispatch, Node::AsyncLoad, Node::AsyncWait.

Every Cat-A op that performs a scan, reduction, or sequential
walk uses Node::Loop: dot, matmul, matmul_tiled, scan_prefix_sum,
aho_corasick, substring_search, softmax (3-pass), layer_norm
(3-pass), attention, blake3 (7 round loops), fnv1a32.

Result: surfaced by tests/cat_a_gpu_differential.rs on a live
5090 run 2026-04-20  -  8 of 10 Cat-A ops fail lowering with
this exact error. relu and broadcast fail differently (element
count inference, under investigation).
"""
fix_plan = """
Implement Node::Loop lowering in
vyre-driver-wgpu/src/lowering/naga_emit/node.rs:

```rust
Node::Loop { body, break_if } => {
    let body_block = self.emit_child_block(body)?;
    // naga::Statement::Loop has `body`, `continuing`, and
    // `break_if` fields. vyre's Node::Loop maps directly:
    // body → Loop.body, break_if → Loop.break_if (optional Expr).
    let break_expr = match break_if {
        Some(expr) => Some(self.emit_expr(expr)?),
        None => None,
    };
    self.function.body.push(
        Statement::Loop {
            body: body_block,
            continuing: Block::new(),
            break_if: break_expr,
        },
        Span::UNDEFINED,
    );
}
```

(Pseudocode  -  verify the Node::Loop variant shape against
vyre-foundation before committing.)

After this lands, FINDING-GPU-1 + GPU-2 should fully unblock
every non-attention non-matmul_tiled Cat-A op. Regenerate
fingerprints, update fixtures, re-run the differential harness.
"""

[[finding]]
id = "FINDING-GPU-4"
date_opened = "2026-04-20"
date_fixed = "2026-04-20"
owner = "contactmukundthiru"
test = "vyre_driver_wgpu::tests::cat_a_gpu_differential::diff_math_broadcast"
status = "fixed"
title = "Cat-A output buffers lack `.with_count()`  -  GPU readback returns 0 bytes"
blocker = """
After FINDING-GPU-1 (BufferDecl::output) + FINDING-GPU-3
(Node::Loop lowering) closed, `broadcast` now compiles + runs
on the 5090 but returns zero bytes. The CPU-ref interpreter
returns `[42, 0, 0, 0]` (one u32 written by broadcast body);
the GPU returns `[]`.

Root cause: `vyre-libs/src/math/broadcast/broadcast.rs` declares
the output with `BufferDecl::output(dst, 1, DataType::U32)` but
no `.with_count(N)`. The wgpu backend reads the output buffer
as `count * element_size` bytes  -  count=0 → 0 bytes readback
even though the shader wrote correctly.

Extends FINDING-GPU-1: not only must the target buffer be
`::output(...)`, it must also carry `.with_count(N)` matching
the number of elements the shader body writes.

Applies to every Cat-A op that doesn't already set `.with_count`
on its output: dot (1), scan_prefix_sum (n), broadcast (varies),
relu (n), fnv1a32 (n), substring_search (n), aho_corasick (n).

