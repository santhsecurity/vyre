[[finding]]
id = "FINDING-V7-TEST-008-F32-HARNESS"
date_opened = "2026-04-21"
owner = "contactmukundthiru"
test = "vyre_libraries::tests::f32_adversarial::*"
status = "open"
title = "Universal harness path is not bit-identical to direct reference execution on NaN/Inf/subnormal f32 inputs"
blocker = """
The new proptest-driven hostile inputs for softmax, layer_norm, and attention
show that the universal-harness path (`validate -> wire round-trip -> optimize`)
changes IEEE-754 bit patterns for NaN/Inf-heavy inputs relative to direct
`vyre_reference::run(program, inputs)`.

Examples:
- softmax flips a negative NaN lane to a positive NaN on `[+Inf, NaN, -Inf, NaN]`
- layer_norm changes NaN payload/sign on `[-Inf, NaN, NaN, +Inf]`
- attention flips the first row from canonical NaN to negative-NaN for a
  hostile NaN/Inf witness

This is a correctness bug in either wire encode/decode or the optimizer
pipeline. The tests are ignored until the engine preserves f32 bit identity.
"""
fix_plan = """
1. Bisect the harness path: compare direct program vs wire-decoded program vs
   optimize(program) vs optimize(optimize(program)) for the hostile witnesses.
2. Identify the first transformation that changes NaN sign/payload bits.
3. Fix the transform or wire codec so IEEE-754 bit identity is preserved.
4. Un-ignore `f32_adversarial.rs` once all 3 ops match direct reference bytes.
"""

