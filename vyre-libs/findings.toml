[[finding]]
id = "FINDING-GPU-9"
date_opened = "2026-04-21"
owner = "contactmukundthiru"
test = "vyre_driver_wgpu::tests::cat_a_gpu_differential::diff_universal_registry"
status = "open"
title = "softmax differs from the 5090 by 1 ULP because WGSL `exp()` does not match the canonical CPU oracle"
blocker = """
`vyre-libs::nn::softmax` now executes end-to-end on the 5090, but the
universal differential harness still reports byte drift on the output
buffer:

CPU: [7b f0 58 3e, ..., f3 6c 13 3f, db f3 28 3e]
GPU: [7c f0 58 3e, ..., f4 6c 13 3f, da f3 28 3e]

The only numerically sensitive operations in the kernel are the `Exp`
sites in `vyre-libs/src/nn/attention/softmax.rs:147-187`. Those lower
through `vyre-driver-wgpu/src/lowering/naga_emit/expr.rs:433-439` to
`MathFunction::Exp`, which maps to hardware WGSL `exp()`. The CPU oracle
is `vyre_reference::ieee754::canonical_exp` (libm-backed), so the GPU
and CPU disagree by 1 ULP on this input set.

Root-cause hypothesis: vyre-wgpu currently delegates `UnOp::Exp`
directly to the vendor transcendental path instead of a deterministic
algorithm proven to match `canonical_exp`.
"""
fix_plan = """
1. Use the existing parity probe in `vyre-driver-wgpu/src/lib.rs:363-392`
   together with `vyre-reference/tests/gap_transcendentals_parity.rs`
   to collect the exact `Exp` mismatch domain on the local 5090.
2. Replace the direct `MathFunction::Exp` lowering in
   `vyre-driver-wgpu/src/lowering/naga_emit/expr.rs:433-439` with a
   deterministic expansion (or a helper function emitted into WGSL)
   whose bit pattern aligns with `vyre_reference::ieee754::canonical_exp`.
3. Re-run `cargo test -p vyre-driver-wgpu --test cat_a_gpu_differential`
   and close this finding only when `vyre-libs::nn::softmax` is byte-identical.
"""

