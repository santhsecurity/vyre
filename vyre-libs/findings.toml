[[finding]]
id = "FINDING-FOUNDATION-1"
date_opened = "2026-04-20"
owner = "contactmukundthiru"
test = "vyre_foundation::tests::adversarial_graph_canonical_laws::{malformed_cycle_graph_is_rejected_without_panic, malformed_dangling_edge_graph_is_rejected_without_panic, malformed_orphan_phi_graph_is_rejected_without_panic}"
status = "open"
title = "graph_view::from_graph silently lowers malformed NodeGraph topology instead of rejecting it"
blocker = """
`vyre_foundation::graph_view::from_graph` currently returns `Program`
directly and ignores `NodeGraph.edges` during lowering. Adversarial
tests added in `vyre-foundation/tests/adversarial_graph_canonical_laws.rs`
prove three malformed graph shapes are accepted as if they were valid:

1. Cycles introduced by `GraphNode.id` / `DataEdge` ordering
2. Dangling edges pointing at nonexistent node ids
3. Orphan `Phi` nodes with no valid incoming topology

Because lowering consults only `graph.nodes` and drops `Phi` variants,
all three cases silently become statement IR with zero validation
errors. At internet scale this is a soundness bug for every future
graph-native optimization pass: malformed topology can erase dependency
constraints and still appear valid downstream.
"""
fix_plan = """
1. Change `graph_view::from_graph` / `NodeGraph::into_program` to return
   `vyre_foundation::Result<Program>`.
2. Validate that every `DataEdge.{from,to}` references an existing node id.
3. Reject dependency cycles in graph topology before lowering.
4. Reject orphan or otherwise ill-formed `Phi` nodes instead of silently
   dropping them.
5. Keep the existing valid-case guarantee: synthetic, well-formed Phi
   chains still lower by dropping Phi nodes after topology validation.
"""

