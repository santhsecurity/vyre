id = "FINDING-GRAPH-1"
date_opened = "2026-04-20"
date_closed = "2026-04-22"
owner = "contactmukundthiru"
test = "vyre_foundation::tests::adversarial_graph_canonical_laws::{malformed_cycle,malformed_dangling_edge,malformed_orphan_phi}_graph_is_rejected_without_panic"
status = "fixed"
title = "graph_view::from_graph silently accepts malformed graphs  -  cycles, dangling edges, orphan Phi"
blocker = """
Surfaced by Codex adversarial swarm 2026-04-20. `from_graph`
takes a NodeGraph and returns a Program without validating:
- Cycles: GraphNode ids that reference one another form a loop;
  current impl silently materializes.
- Dangling edges: an edge pointing at a non-existent node id  - 
  accepted.
- Orphan Phi: a Phi node with no incoming edges  -  accepted.

At internet scale this means a downstream generated graph
to `from_graph` can hit undefined-behavior lowering without a
diagnostic  -  the kind of bug where compiled WGSL/SPIR-V becomes
subtly nondeterministic.
"""
fix_plan = """
Add a `GraphValidateError` enum with variants for Cycle
(include offending node id path), DanglingEdge (source + target
ids), OrphanPhi. Rewrite `from_graph` to return
`Result<Program, GraphValidateError>`.

Every consumer (graph-first authoring tools, the 0.8 graph-IR
upgrade mentioned in VISION) benefits from the cleaner error
surface.
"""

