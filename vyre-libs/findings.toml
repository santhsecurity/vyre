id = "FINDING-V7-TEST-013-LOGICAL-AND"
date_opened = "2026-04-21"
date_fixed = "2026-04-29"
owner = "contactmukundthiru"
test = "logical_should_panic::and_panics_on_output_buffer_size_mismatch"
status = "fixed"
title = "logical::and accepts undersized output buffers instead of panicking"
blocker = """
`vyre_libs::logical::and("a", "b", "out", 4)` currently succeeds when the
provided output buffer is shorter than the declared 4-lane output width.
The new `#[should_panic]` regression proves the reference/runtime path
accepts an undersized output witness and returns successfully instead of
trapping on a contract violation.
"""
fix_plan = """
1. Add explicit output-size validation before executing logical ops.
2. Make the trap actionable: `Fix: provide an output buffer sized for n lanes`.
3. Remove the ignore from tests/logical_should_panic.rs and keep the panic
   contract locked in for every backend path.
"""

