Audit `vyre-libs/src/math/linalg/matmul.rs` body. Verify that
the inner accumulator is let-bound INSIDE the outer row loop,
not outside it. A `let acc = u32(0)` must fire once per
(row, col) pair, not once per whole kernel.

Compare the naga-emitted WGSL against a known-good matmul
(e.g. wgpu-examples/compute_blas) and diff.
"""

