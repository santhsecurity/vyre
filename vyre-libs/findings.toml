[[finding]]
id = "FINDING-CACHE-1"
date_opened = "2026-04-20"
date_fixed = "2026-04-21"
owner = "contactmukundthiru"
test = "vyre_runtime::tests::adversarial_disk::symlink_attack_must_not_read_etc_passwd"
status = "fixed"
title = "DiskCache::get follows symlinks  -  symlink attack reads arbitrary files"
blocker = """
Surfaced by the Kimi adversarial swarm 2026-04-20. `DiskCache::get`
calls `fs::read(path)` which transparently follows symlinks. A
process with write access to the cache root can create a symlink
`root/<hex>.bin -> /etc/passwd`, and any subsequent `get` returns
/etc/passwd contents as if it were the cached artifact.

At internet scale (LAW 8): one compromised cache root = billions
of pipelines returning attacker-controlled bytes. A downstream scan
that loads its cached pipeline from disk would execute whatever
the attacker substituted.
"""
fix_plan = """
In DiskCache::get, use `std::fs::File::open(path)` then
`file.metadata()?.file_type().is_symlink()` check (or
`fs::symlink_metadata` before opening). Reject symlinks
explicitly with an error that triggers re-compile.

Same protection on put's `rename`: ensure the target isn't a
pre-existing symlink before rename.
"""

[[finding]]
id = "FINDING-CACHE-2"
date_opened = "2026-04-20"
date_fixed = "2026-04-21"
owner = "contactmukundthiru"
test = "vyre_runtime::tests::adversarial_disk::corrupted_bin_file_rejected"
status = "fixed"
title = "DiskCache::get returns partially-written (torn) .bin files as valid hits"
blocker = """
Surfaced by Kimi 2026-04-20. A process that writes 500 bytes to
`root/<hex>.bin` then crashes (or a fsync-less write that loses
the tail) leaves a partial file. `DiskCache::get` reads that file
with `fs::read` and returns the partial bytes as a valid artifact.

At internet scale: one torn pipeline-cache blob = every consumer
that loads it hits corrupted SPIR-V / WGSL / native bytecode and
UB-dispatches on the GPU.
"""
fix_plan = """
Two-layer defense:

1. Length prefix + blake3 checksum in the on-disk format:
   `<8 bytes length LE><N bytes payload><32 bytes blake3(payload)>`.
   `get` validates checksum before returning.

2. put uses `write + fsync + rename` (atomic replace) so a crash
   mid-write leaves either the prior file or nothing, never a
   torn state. Currently put is `write + rename` which drops
   fsync  -  adding `tmp_file.sync_all()?` before rename closes
   this class of corruption on crash.
"""

