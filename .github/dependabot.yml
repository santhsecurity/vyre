version: 2
updates:
  - package-ecosystem: cargo
    directory: /libs/performance/matching/vyre
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /libs/performance/matching/vyre
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
