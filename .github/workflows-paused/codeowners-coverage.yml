name: CODEOWNERS Coverage

on:
  pull_request:

permissions:
  contents: read

jobs:
  codeowners-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run CODEOWNERS coverage test
        run: cargo test -p vyre-conform --test codeowners_coverage -- codeowners_coverage_for_trust_boundary
