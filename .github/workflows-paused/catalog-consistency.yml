name: Catalog Consistency

on:
  pull_request:

permissions:
  contents: read

jobs:
  catalog-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run catalog consistency test
        run: cargo test -p vyre catalog_consistency
