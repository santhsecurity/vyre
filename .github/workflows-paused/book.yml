name: book

on:
  push:
    branches: [main]

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: cargo install mdbook --locked

      - name: Build book
        run: mdbook build vyre-core/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vyre-core/docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
