# Build-only bench target smoke gate.
#
# Compiles the active Criterion bench surface on hosted CI. Real
# throughput/regression checks live in `bench.yml` (Criterion baseline
# compare) and `gpu-parity.yml` (self-hosted GPU).

name: bench-regression

on:
  pull_request:
    branches: [main]
  schedule:
    # Nightly sweep so drift is caught even if no PR touches perf code.
    - cron: "0 6 * * *"

jobs:
  bench-target-smoke:
    name: bench target build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bench-setup

      - name: Compile non-GPU bench targets
        run: |
          cargo bench -p vyre-bench-smoke --no-run
          cargo bench -p vyre-bench-deep --no-run
          cargo bench -p vyre-foundation --no-run
          cargo bench -p vyre-intrinsics --no-run
          cargo bench -p vyre-libs --no-run
          cargo bench -p vyre-reference --no-run
          cargo bench -p vyre-runtime --no-run
          cargo bench -p vyre-driver-wgpu --no-run

      - name: Enforce smoke benchmark runtime budget
        run: scripts/check_bench_smoke_runtime.sh
