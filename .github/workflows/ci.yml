name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  matrix:
    name: ${{ matrix.os }} / ${{ matrix.rust-toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust-toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "${{ matrix.rust-toolchain }}" \
            --profile minimal \
            --component clippy \
            --component rustfmt
          rustup default "${{ matrix.rust-toolchain }}"

      - name: cargo fmt
        shell: bash
        run: cargo fmt --check

      - name: abstraction gate
        shell: bash
        run: cargo run -p xtask -- abstraction-gate

      - name: cargo clippy (advisory)
        shell: bash
        continue-on-error: true
        run: cargo clippy --workspace

      - name: cargo test
        shell: bash
        run: cargo test --workspace

      - name: cargo doc
        shell: bash
        run: cargo doc --workspace

  release-evidence-shape:
    name: release evidence shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          MSRV="$(grep -E '^rust-version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          rustup toolchain install "$MSRV" --profile minimal
          rustup default "$MSRV"

      - name: Generate structural release evidence
        shell: bash
        run: cargo run --bin xtask -- release-evidence

      - uses: actions/upload-artifact@v4
        with:
          name: vyre-structural-release-evidence
          path: ./release/evidence/**/*.json
