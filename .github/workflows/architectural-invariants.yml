name: architectural-invariants

# Enforces the substrate-neutrality contract from THESIS.md + ARCHITECTURE.md.
# Each guard catches a different class of rebuild regression and runs in under
# five seconds with zero Rust toolchain requirement. A PR that fails any of
# them is a rebuild regression.
#
#   1. check_architectural_invariants.sh   -  pure crates may not carry
#                                            non-dev backend/conform deps.
#   2. check_no_closed_ir_enums.sh         -  Law A: IR uses open traits,
#                                            not closed enums.
#   3. check_no_string_wgsl.sh             -  Law B (string): shader emission
#                                            goes through the naga AST, not
#                                            string concatenation.
#   4. check_no_shader_assets.sh           -  Law B (asset): no .wgsl asset
#                                            files under op / dialect trees.
#   5. check_capability_negotiation.sh     -  Law C: backends advertise
#                                            supported_ops and validate
#                                            programs before dispatch.
#   6. check_unsafe_justifications.sh      -  Law D: every `unsafe` block has
#                                            a `// SAFETY:` comment.
#   7. check_dialect_coverage.sh           -  every Category::C OpDef has
#                                            at least one backend lowering.
#   8. check_trait_freeze.sh               -  the frozen trait contracts from
#                                            ARCHITECTURE.md still exist.
#   9. check_registry_consistency.sh       -  DialectRegistry + OpDefRegistration
#                                            registries agree.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  architectural-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pure-crate dependency invariant
        run: bash scripts/check_architectural_invariants.sh

  law-a-closed-enums:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Law A  -  no closed IR enums
        run: bash scripts/check_no_closed_ir_enums.sh

  law-b-string-wgsl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Law B  -  no string-based WGSL emission
        run: bash scripts/check_no_string_wgsl.sh

  law-b-shader-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Law B  -  no shader asset files under op / dialect trees
        run: bash scripts/check_no_shader_assets.sh

  law-c-capability-negotiation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Law C  -  supported_ops + validate_program
        run: bash scripts/check_capability_negotiation.sh

  law-d-unsafe-justifications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Law D  -  every unsafe block has SAFETY justification
        run: bash scripts/check_unsafe_justifications.sh

  dialect-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every Category::C OpDef has a backend lowering
        run: bash scripts/check_dialect_coverage.sh

  trait-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Frozen trait contracts still exist
        run: bash scripts/check_trait_freeze.sh

  registry-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: DialectRegistry and OpDefRegistration inventories agree
        run: bash scripts/check_registry_consistency.sh

  no-raw-unwrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hard ban on raw unwrap() and expect()
        run: bash scripts/check_no_raw_unwrap.sh

  no-hot-path-inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: inventory::iter forbidden on dispatch hot path
        run: bash scripts/check_no_hot_path_inventory.sh

  no-opspec-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Legacy OpSpec shim eradicated from source
        run: bash scripts/check_no_opspec_tokens.sh

  error-codes-cataloged:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every V### / E-* / W-* / B-* / C-* code in source is cataloged
        run: bash scripts/check_error_codes_cataloged.sh

  consistency-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Op id uniqueness + dialect format invariants
        run: bash scripts/check_consistency_contracts.sh

  no-deferred-work:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No deferred-work markers in shipped source
        run: bash scripts/check_no_deferred_work.sh

  base-monument:
    runs-on: ubuntu-latest
    # Monument base: 9 prerequisites vyre must satisfy before any claim
    # to release. Extensibility demo exists, three-substrate parity,
    # signed certs, benchmark honesty, zero-runtime-cost evidence,
    # adversarial-test floor, reference-interpreter isolation, hot-path
    # allocation ceiling, IEEE-754 strict. See check_base_monument.sh.
    steps:
      - uses: actions/checkout@v4
      - name: 9 monument-base prerequisites
        run: bash scripts/check_base_monument.sh

  abstraction-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Registered building-block abstraction
        run: bash scripts/check_abstraction.sh

  vyre-lints-raw-ir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: vyre-lints  -  no raw IR construction in vyre-libs
        run: cargo run -p vyre-lints --release --quiet -- --workspace-root .

  vyre-lints-allowlist-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git blame can age allowlist entries
      - uses: dtolnay/rust-toolchain@stable
      - name: vyre-lints  -  allowlist drift sentinel (≤14 days)
        run: cargo run -p vyre-lints --release --quiet -- --check-drift --workspace-root .

  op-matrix-coverage:
    runs-on: ubuntu-latest
    # ROADMAP S6: every registered op family must have an OP_MATRIX.toml
    # row. The matrix is generated from inventory registries plus manual
    # foundation rows; any drift between source and `OP_MATRIX.toml`
    # fails this check. Run `cargo run -p xtask -- op-matrix --write` locally to
    # regenerate when registries change.
    # ROADMAP S7: validate_records also enforces tier-vs-id consistency
    # so a Tier-2.5 row can't carry `vyre-libs::` ops or vice versa.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo run -p xtask -- op-matrix --check
        run: cargo run -p xtask -- op-matrix --check

  lego-audit:
    runs-on: ubuntu-latest
    # The 10-check LEGO audit (no-reinvention, depth-of-composition,
    # primitive coverage, cross-dialect reach-through, god-files,
    # composition-chain coverage, trend, composability, name-stem
    # collision, operand-shape duplicate). Trades CI seconds for op-
    # quality safety: fingerprinting requires loading every registered
    # op via inventory, so this is the slowest invariant in the file.
    # MUST be a required check on the merge gate; if the GitHub branch-
    # protection rule does not require it, raw-IR scanning is moot.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # check 7 (trend) needs the previous tag
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo run -p xtask -- lego-audit --with-repo
        run: cargo run -p xtask -- lego-audit --with-repo
