name: Bench

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  criterion-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bench-setup

      - name: Save baseline from main
        run: |
          git fetch origin main
          git checkout origin/main
          ./cargo_full bench -p vyre-libs -- --save-baseline main
          git checkout -

      - name: Compare PR against baseline
        run: |
          ./cargo_full bench -p vyre-libs -- --baseline main --save-baseline pr 2>&1 | tee bench.log

      - name: Check for regressions > 5%
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'change: \[' bench.log; then
            echo "FAIL: no Criterion comparison lines found; benchmark target is not exercising Criterion"
            exit 1
          fi
          worst="$(grep -oE 'change: \[[^]]+\]' bench.log \
            | awk -F'[][% ]+' '{print $4}' \
            | sort -g | tail -1)"
          echo "Worst median change: ${worst}%"
          awk -v w="$worst" 'BEGIN { if (w+0 > 5) { print "FAIL: criterion regression > 5% (worst " w "%)"; exit 1 } print "PASS: no criterion regressions > 5%" }'
