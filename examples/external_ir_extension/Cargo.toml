[package]
name = "external_ir_extension"
version = "0.1.0"
edition = "2021"

[dependencies]
# vyre-core's package name is just `vyre`. The dir is vyre-core/ for
# historical layout reasons; the published crate is `vyre`.
vyre = "0.4.2"
vyre-driver = "0.4.2"
inventory = "=0.3.24"

[workspace]

[patch.crates-io]
vyre = { path = "../../vyre-core" }
vyre-driver = { path = "../../vyre-driver" }
