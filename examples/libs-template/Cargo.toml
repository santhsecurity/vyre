[package]
name = "{{crate_name}}"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Community Cat-A op dialect for vyre-libs"
repository = "https://github.com/{{gh_org}}/{{crate_name}}"
readme = "README.md"
keywords = ["gpu", "vyre", "cat-a"]
categories = ["algorithms"]

[dependencies]
vyre = "0.4.2"
vyre-libs = { version = "0.4.2", default-features = false }
vyre-foundation = "0.4.2"
vyre-spec = "0.4.2"
thiserror = "=2.0.18"
inventory = "=0.3.24"

[dev-dependencies]
vyre-reference = "0.4.2"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[workspace]

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
