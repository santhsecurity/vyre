# vyre  -  Machine-readable performance targets per crate.
#
# Each entry locks a measurable target on a named bench/test. Values are
# the publish-blocker ceilings. The release signoff gate
# (`scripts/check_perf_targets.sh`) verifies that every entry below has
# a matching benchmark file under `benches/` or `tests/`, that the
# named ID is a real Criterion benchmark id or test name, and (when
# `benches/RESULTS.md` exists) that the latest measurement does not
# exceed the budget.
#
# Why machine-readable: humans drift. CI does not.
#
# Schema:
#   [crates.<name>.targets.<id>]
#     bench        -  file path under benches/ or tests/ that produces the metric
#     metric       -  one of {time_ns, time_us, time_ms, throughput_gibps,
#                            throughput_kops, allocs, bytes, hit_rate_pct}
#     budget       -  numeric ceiling (or floor for hit_rate_pct / throughput_*)
#     direction    -  "max" (smaller is better) or "min" (larger is better)
#     description  -  one-line human pointer
#
# The same bench can produce multiple metrics; one entry per metric.

[crates.vyre-driver-wgpu.targets.dispatch_latency_cached]
bench = "vyre-driver-wgpu/tests/dispatch_hot_path.rs"
metric = "time_us"
budget = 50
direction = "max"
description = "Cached small-program dispatch latency (audit item #15)."

[crates.vyre-driver-wgpu.targets.batched_submit_latency]
bench = "vyre-driver-wgpu/tests/dispatch_hot_path.rs"
metric = "time_us"
budget = 200
direction = "max"
description = "Batched submit + readback latency for 16-way dispatches."

[crates.vyre-driver-wgpu.targets.long_buffer_throughput]
bench = "vyre-driver-wgpu/tests/dispatch_hot_path.rs"
metric = "throughput_gibps"
budget = 8
direction = "min"
description = "Hot 4 MiB long-buffer dispatch + readback throughput."

[crates.vyre-driver-wgpu.targets.compile_cache_hit_rate]
bench = "vyre-driver-wgpu/tests/pipeline_cache_contract.rs"
metric = "hit_rate_pct"
budget = 95
direction = "min"
description = "Steady-state compile-cache hit rate; falls when canonicalization drifts."

[crates.vyre-driver-wgpu.targets.dispatch_steady_state_allocs]
bench = "vyre-driver-wgpu/tests/dispatch_allocation_contract.rs"
metric = "allocs"
budget = 4
direction = "max"
description = "Steady-state heap allocations per dispatch (audit item #10)."

