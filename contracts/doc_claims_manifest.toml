# Doc-claim-to-test manifest.
#
# Every README / docs performance or capability claim that should be
# regression-gated lands here as one row. The gate
# (`scripts/check_doc_claim_to_test.sh`) verifies:
#   - each claim's `doc` file exists and contains the `phrase`.
#   - each claim's `test` file exists.
#
# Adding a new headline claim ("vyre dispatches in <50 µs", "wgpu+spirv
# parity green on N programs") requires one row here AND a real
# proving test/bench. Removing a claim requires removing both.
#
# This is the "for every claim the docs make, there is a test that
# fails when the claim becomes false" contract from CLAUDE.md, encoded.

[[claim]]
id = "dispatch_hot_path_budgets"
doc = "vyre-driver-wgpu/CONFIG.md"
phrase = "latency / throughput micro-benches"
test = "vyre-driver-wgpu/tests/dispatch_hot_path.rs"
description = "Cached small-program latency + 4 MiB throughput dispatch contract."

