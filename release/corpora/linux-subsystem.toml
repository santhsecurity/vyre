# Frozen Linux subsystem corpus for Vyre 0.4.1 C parser release proof.
schema_version = 1
name = "linux-lib"
description = "Linux kernel lib subsystem: broad C utility code without driver-specific extension bias."
linux_root = "/media/mukund-thiru/SanthData/Santh/corpus/repos/linux"
subsystem = "lib"
corpus_root = "/media/mukund-thiru/SanthData/Santh/corpus/repos/linux/lib"
file_list = "release/corpora/linux-subsystem-files.txt"
c_file_count = 490
source_bytes = 7394810
