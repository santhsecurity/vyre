kconfig_file = "lib/Kconfig"

include_dirs = [
  "/media/mukund-thiru/SanthData/Santh/corpus/repos/linux/include",
  "/media/mukund-thiru/SanthData/Santh/corpus/repos/linux/arch/x86/include",
