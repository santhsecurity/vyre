# Canonical op/backend optimization and coverage matrix.
# Generated by `cargo_full run --bin xtask -- op-matrix --write` from inventory registries plus manual foundation rows.
# Do not hand-edit generated rows; change the source registry or generator instead.

schema = 1

backend_status_values = [
  "supported",
  "experimental",
  "not_applicable",
  "blocked_release",
]

tier_values = [
  "foundation_ir",
  "intrinsic",
  "primitive",
  "libs",
  "runtime",
  "external",
]

[[op]]
family = "elementwise_add"
tier = "foundation_ir"
owners = ["vyre-bench/src/cases/elementwise.rs"]
ops = ["f32_add"]
registry_sources = ["manual.bench"]
reference = "supported"
foundation_ir = "supported"
cuda = "supported"
wgpu = "supported"
spirv = "experimental"
release_blocking_notes = "CUDA is the canonical performance backend for this release; active-time benchmark target is in BENCH_TARGETS.toml."
tests = ["vyre-driver-cuda/tests/resident_dispatch_contracts.rs"]
bench_targets = ["foundation.elementwise.add.1m"]

[[op]]
family = "integer_strength_reduction"
tier = "foundation_ir"
owners = ["vyre-foundation/src/optimizer/passes/algebraic/strength_reduce"]
ops = ["mul_power_of_two_to_shift", "div_power_of_two_to_shift", "mod_power_of_two_to_and", "shift_add_decomposition", "constant_division"]
registry_sources = ["manual.foundation_ir"]
reference = "not_applicable"
foundation_ir = "supported"
cuda = "not_applicable"
wgpu = "not_applicable"
spirv = "not_applicable"
release_blocking_notes = "Backend rows are not applicable because the original IR should be rewritten before lowering."
tests = ["vyre-foundation/src/optimizer/passes/algebraic/strength_reduce/tests.rs"]
bench_targets = ["integer_arithmetic_micro"]

