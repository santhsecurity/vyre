acle)</text><text x="465" y="273" class="sub" text-anchor="middle">exact ground truth the conform gate diffs every witness against</text><rect width="590" height="50" x="170" y="310" fill="#fff" stroke="#1d4ed8" rx="6"/><text x="465" y="332" class="label" text-anchor="middle">Layer 1 primitives: bitwise · arith · workgroup coord (stack/queue/hashmap/...) · compiler primitives</text><path d="M460 370v25" class="edge"/><rect width="300" height="70" x="140" y="400" rx="8" style="fill:#dcfce7;stroke:#166534;stroke-width:1.5"/><text x="290" y="425" class="label" text-anchor="middle">Backend (WGSL / Metal / SPIR-V / CPU ref)</text><text x="290" y="445" class="sub" text-anchor="middle">impl VyreBackend::dispatch  -  one file add</text><text x="290" y="461" class="sub" text-anchor="middle">swapping target is a one-file change</text><rect width="300" height="70" x="470" y="400" rx="8" style="fill:#fce7f3;stroke:#a21caf;stroke-width:1.5"/><text x="620" y="425" class="label" text-anchor="middle">DialectRegistry + KAT parity</text><text x="620" y="445" class="sub" text-anchor="middle">gates · oracles · archetypes · mutations · witnesses</text><text x="620" y="461" class="sub" text-anchor="middle">binary verdict  -  no severity, no &quot;mostly&quot;</text><path d="M440 435h30" class="edge"/><rect width="280" height="50" x="320" y="495" rx="8" style="fill:#fef2f2;stroke:#b91c1c;stroke-width:1.5"/><text x="460" y="518" class="label" text-anchor="middle">Certificate  OR  Violation { Fix: … }</text><text x="460" y="536" class="sub" text-anchor="middle">durable JSON+HTML proof document</text><path d="M620 470v15H460v10" class="edge"/><rect width="110" height="190" x="800" y="160" rx="8" style="fill:#fde68a;stroke:#b45309;stroke-width:1.5"/><text x="855" y="185" class="label" text-anchor="middle">vyre-std</text><text x="855" y="205" class="sub" text-anchor="middle">Layer 2</text><text x="855" y="230" class="sub" text-anchor="middle">regex_to_nfa</text><text x="855" y="248" class="sub